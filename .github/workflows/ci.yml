name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # TODO: re-enable once SvelteKit deps are properly wired
      # (missing @sveltejs/vite-plugin-svelte; package.json needs "type": "module";
      # tsconfig.json extends a path that requires `svelte-kit sync` to generate)
      # - name: Build
      #   run: npm run build
